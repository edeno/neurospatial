name: Notebook regen smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Runs two representative notebooks end-to-end to catch silent regressions
# in the example surface that ``test_doc_snippets`` (which only exercises
# hand-curated snippets) wouldn't see. The choices are intentional:
# - 11_place_field_analysis exercises ``Environment.from_samples`` →
#   ``compute_spatial_rate`` → ``detect_place_fields`` → the metrics suite,
#   the most commonly-failing axis in practice.
# - 20_bayesian_decoding exercises the decode golden path
#   (``decode_session``) plus the manual ``compute_spatial_rates`` →
#   ``bin_spikes_in_time`` → ``decode_position`` path, so the decode
#   tutorial can't silently drift.
jobs:
  re-execute-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev --extra notebooks

      - name: Re-execute 11_place_field_analysis.ipynb
        env:
          MPLBACKEND: Agg
        run: |
          uv run jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=600 \
            examples/11_place_field_analysis.ipynb

      - name: Re-execute 20_bayesian_decoding.ipynb
        env:
          MPLBACKEND: Agg
        run: |
          uv run jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=600 \
            examples/20_bayesian_decoding.ipynb
