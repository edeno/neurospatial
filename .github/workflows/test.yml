name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        # animation extra brings ipywidgets + napari[all] (which pulls in qtpy);
        # the widget-backend and callback-audit tests skip cleanly only when
        # those imports succeed. Without it the matrix loses ~15 tests.
        run: |
          uv sync --extra dev --extra animation
        env:
          UV_PYTHON: python${{ matrix.python-version }}

      - name: Install ffmpeg
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install ffmpeg
          elif [ "$RUNNER_OS" == "Windows" ]; then
            choco install ffmpeg -y
          fi
        shell: bash

      - name: Run ruff check
        run: |
          uv run ruff check .
        env:
          UV_PYTHON: python${{ matrix.python-version }}

      - name: Run ruff format check
        run: |
          uv run ruff format --check .
        env:
          UV_PYTHON: python${{ matrix.python-version }}

      - name: Run mypy
        run: |
          uv run mypy src/neurospatial
        continue-on-error: true  # Don't fail build on type errors (yet)
        env:
          UV_PYTHON: python${{ matrix.python-version }}

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=src/neurospatial --cov-report=xml --cov-report=term
        env:
          MPLBACKEND: Agg  # Use non-GUI backend for matplotlib
          UV_PYTHON: python${{ matrix.python-version }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  napari:
    name: Napari tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Qt5 system deps: PyQt5 imports under napari, but Qt aborts under
          # xvfb without the full set of XCB plugins. Mirrors napari's own
          # headless-CI deps list.
          sudo apt-get install -y \
            ffmpeg xvfb \
            libegl1 libopengl0 \
            libxkbcommon-x11-0 libxkbcommon0 \
            libdbus-1-3 libfontconfig1 libglib2.0-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1

      - name: Install dependencies
        run: |
          uv sync --extra dev --extra animation

      - name: Run napari tests
        run: |
          xvfb-run -a uv run pytest -n 0 -m "napari and not slow"
        env:
          MPLBACKEND: Agg
