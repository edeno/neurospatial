name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --extra docs

      - name: Sync example notebooks
        run: |
          uv run python docs/sync_notebooks.py

      - name: Verify example mirror is in sync
        run: |
          git diff --exit-code docs/examples

      - name: Build documentation
        run: |
          uv run mkdocs build --strict

      # This is a GitHub Pages *project* site served under the `/neurospatial/`
      # subpath (mkdocs `site_url`), so mkdocs-material emits absolute nav/asset
      # links like `/neurospatial/user-guide/...`. lychee resolves such
      # root-relative links via `--root-dir`, so expose a directory whose
      # `neurospatial/` entry is the built site (relative symlink -> mount-path
      # independent inside the lychee container).
      - name: Prepare link-check root (map /neurospatial -> built site)
        run: |
          rm -rf _lc && mkdir -p _lc && ln -s ../site _lc/neurospatial

      # `mkdocs build --strict` above already fails on broken nav and broken
      # relative page links. These steps add in-page #anchor validation over the
      # built HTML, so a link to a heading that was renamed or removed is caught.
      # `--offline` skips every external URL, so the check needs no network and
      # never flakes.
      #
      # Two flags make lychee understand this mkdocs site:
      #   --index-files index.html  resolves directory URLs (`.../page/#anchor`,
      #     trailing slash) to the page's index.html and checks the fragment
      #     there; without it every directory-URL anchor is a false "Cannot find
      #     fragment".
      #   --root-dir _lc            resolves the `/neurospatial/...` absolute
      #     links (see the Prepare step above).
      #
      # BLOCKING check over hand-authored pages. The mkdocstrings API reference
      # (site/api) is excluded as a *crawl source*: its pages are generated and
      # out of scope for this audit. Links *into* its anchors from hand-authored
      # pages are still validated (and pass). The example notebooks
      # (site/examples) are covered by the separate, non-blocking step below.
      - name: Check internal links and anchors (hand-authored docs)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --include-fragments
            --index-files index.html
            --root-dir _lc
            --exclude-path site/examples
            --exclude-path site/api
            './site/**/*.html'
          fail: true

      # NON-BLOCKING check over the example notebooks (site/examples). This is
      # no longer hidden from CI: every broken in-page anchor and cross-notebook
      # link is surfaced in the job log. All author-authored links in the
      # notebooks are fixed and pass. The only remaining failures are the
      # right-sidebar table-of-contents anchors, which mkdocs-jupyter (0.25.x)
      # generates from a separate Markdown pass whose heading slugs diverge from
      # the heading ids it actually emits whenever a heading contains a code
      # span (id keeps a trailing `-info`, the ToC drops it) or is duplicated
      # (the ToC disambiguates with `_1`/`_2` but the emitted ids are not
      # unique). Those sidebar anchors are unreachable from the notebook source
      # or from mkdocs config — an upstream tooling limitation — so this step is
      # reported but does not block the build. Make it blocking (remove
      # continue-on-error and the separate step, folding site/examples back into
      # the check above) once mkdocs-jupyter aligns the two slug paths.
      - name: Check internal links and anchors (example notebooks, non-blocking)
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --include-fragments
            --index-files index.html
            --root-dir _lc
            './site/examples/**/*.html'
          fail: true

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
