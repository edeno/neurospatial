name: Tests (pynapple interop)

# pynapple is an optional extra. The default test job does NOT install it, so
# the pynapple ingress/egress (from_pynapple / to_pynapple) and the TsGroup/Tsd
# adapter flows would otherwise only ever be skipped. This job installs the
# pynapple extra and runs the pynapple-marked tests.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pynapple:
    name: pynapple interop tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies (with pynapple extra)
        run: |
          uv sync --extra dev --extra pynapple

      - name: Run pynapple interop tests
        run: |
          uv run pytest -n 0 -m pynapple -q
        env:
          MPLBACKEND: Agg
