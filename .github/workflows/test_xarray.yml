name: Tests (xarray interop)

# xarray is an optional extra. The default test job does NOT install it, so the
# labeled-Dataset to_xarray() exports would otherwise go untested in CI. This
# job installs the xarray extra and runs only the xarray interop tests.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  xarray:
    name: xarray interop tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies (with xarray extra)
        run: |
          uv sync --extra dev --extra xarray

      - name: Run xarray interop tests
        run: |
          uv run pytest -n 0 \
            tests/encoding/test_spatial_xarray_interop.py \
            tests/decoding/test_xarray_interop.py \
            tests/decoding/test_result.py \
            -q
        env:
          MPLBACKEND: Agg
