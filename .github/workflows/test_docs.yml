name: Doc snippets

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-doc-snippets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run on the lowest and highest supported Python so a snippet that
        # accidentally uses 3.11+-only syntax (e.g. PEP 695 type-parameters,
        # `Self`, structural unpacks) is caught before users on 3.10 hit it.
        # Intermediate versions are covered by tests.yml.
        python-version: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        # nwb + jax extras let the NWB/JAX docstring examples execute headlessly.
        # napari-backed modules need a display and are exercised by the
        # dedicated napari job in test.yml, so they are ignored below.
        run: uv sync --extra dev --extra nwb --extra jax

      - name: Run module doctests
        env:
          MPLBACKEND: Agg
        # ``-n0`` disables xdist (pytest.ini sets ``-n auto`` in addopts).
        # ``--doctest-modules`` imports every module to collect doctests, so each
        # xdist worker holds a full copy of the library + JAX in memory; running
        # the heavy simulation-session example doctests across 4 such workers
        # exhausted the hosted runner's RAM and got the runner killed ("received
        # a shutdown signal"). Sequential doctests use a single import footprint
        # and finish in ~30s, well within budget.
        run: >-
          uv run pytest --doctest-modules src/neurospatial/ -n0
          --ignore=src/neurospatial/annotation/_napari_widget.py
          --ignore=src/neurospatial/annotation/_track_widget.py
          --ignore=src/neurospatial/animation/config.py

      - name: Run curated doc-snippet smoke test
        env:
          MPLBACKEND: Agg
        run: uv run python scripts/test_doc_snippets.py

      - name: Self-test (helper regression)
        env:
          MPLBACKEND: Agg
        run: uv run pytest tests/test_doc_snippets_helper.py -q
